<form (ngSubmit)="adicionarIngrediente()">
  <input type="text" placeholder="Nome do ingrediente" [(ngModel)]="nomeIngrediente" name="nomeIngrediente">
  <input type="number" placeholder="Quantidade" [(ngModel)]="quantidadeIngrediente" name="quantidadeIngrediente">
  <button type="submit">Adicionar</button>
</form>
